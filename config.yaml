# ============================================================================
#  Automated Website Seller — main configuration
#  Edit this file freely. Secrets live in .env / GitHub Secrets, NOT here.
# ============================================================================

# Your business identity (used in emails + generated sites + legal footer).
brand:
  name: "Shiftora"
  from_email: "info@shiftora.ai"
  reply_to: "info@shiftora.ai"
  # REQUIRED for legal compliance (CAN-SPAM / Spam Act / CASL all mandate a
  # real physical postal address in every marketing email). Put a real one.
  postal_address: "REPLACE WITH YOUR REAL POSTAL ADDRESS"
  # Your free Cal.com 30-min booking link — becomes the email call-to-action.
  # See GO_LIVE.md step 1 to create one.
  booking_url: "https://cal.com/your-handle/30min"
  # Where prospects' preview sites are served from (your GitHub Pages base URL).
  previews_base_url: "https://dagashreshth.github.io/automated-website-seller"
  # Unsubscribe handling. A mailto unsubscribe is the zero-cost option; anyone
  # who replies/asks is auto-added to state/suppression.csv (run --unsubscribe).
  unsubscribe_email: "info@shiftora.ai"

# ----------------------------------------------------------------------------
# TARGETING
# ----------------------------------------------------------------------------
targeting:
  # Only contact prospects in these countries (ISO names as they appear in OSM
  # / Apollo). Restricted to the most legally-defensible high-income markets per
  # your decision. EU/EEA (incl. Sweden/Finland/Ireland) is OFF — those are the
  # riskiest for cold email (GDPR/ePrivacy opt-in); add them back here only if
  # you accept that risk, and re-enable the matching areas below.
  allowed_countries:
    - "Australia"
    - "New Zealand"
    - "United Kingdom"
    - "United States"
    - "Canada"
  # Hard safety cap on emails actually sent per run (deliverability + cost).
  # Start LOW and ramp slowly — see GO_LIVE.md warm-up schedule.
  max_outreach_per_run: 15

# ----------------------------------------------------------------------------
# SOURCE 1: OpenStreetMap (FREE, no API key) — local businesses w/o a website
# ----------------------------------------------------------------------------
osm:
  enabled: true
  # ROTATION: with rotate=true the run scans `areas_per_run` towns at a time and
  # cycles through the whole list over successive days, so you cover everywhere
  # without rescanning the same place each morning. ~28 areas / 4 per run ≈ a
  # fresh full sweep every 7 days. Towns/suburbs (not whole big cities) keep the
  # Overpass queries fast and the prospects genuinely small/local.
  rotate: true
  areas_per_run: 4
  areas:
    # --- Australia (priority market, most defensible legally) ---
    - "Fremantle, Western Australia, Australia"
    - "Byron Bay, New South Wales, Australia"
    - "Margaret River, Western Australia, Australia"
    - "Noosa Heads, Queensland, Australia"
    - "Fitzroy, Victoria, Australia"
    - "Newtown, Sydney, New South Wales, Australia"
    - "Ballarat, Victoria, Australia"
    - "Port Douglas, Queensland, Australia"
    # --- New Zealand ---
    - "Wanaka, New Zealand"
    - "Mount Maunganui, Tauranga, New Zealand"
    - "Nelson, New Zealand"
    # --- United Kingdom ---
    - "Totnes, Devon, England"
    - "Hebden Bridge, West Yorkshire, England"
    - "Frome, Somerset, England"
    - "St Ives, Cornwall, England"
    # --- Canada ---
    - "Canmore, Alberta, Canada"
    - "Stratford, Ontario, Canada"
    - "Nelson, British Columbia, Canada"
    # --- United States ---
    - "Asheville, North Carolina, USA"
    - "Bend, Oregon, USA"
    - "Burlington, Vermont, USA"
    - "Sedona, Arizona, USA"
    # --- DISABLED: EU/EEA + Ireland (legally riskiest; not in allowed_countries).
    #     Re-enable these AND add the country above only if you accept the risk.
    # - "Kinsale, County Cork, Ireland"
    # - "Westport, County Mayo, Ireland"
    # - "Porvoo, Finland"
    # - "Visby, Gotland, Sweden"
    # - "Ålesund, Norway"
    # - "Roskilde, Denmark"
  # OSM category selectors (key=value). Business types pulled that have NO
  # website tag AND publish an email. Add/remove freely.
  categories:
    - "amenity=cafe"
    - "amenity=restaurant"
    - "amenity=bar"
    - "amenity=pub"
    - "amenity=fast_food"
    - "amenity=ice_cream"
    - "shop=hairdresser"
    - "shop=beauty"
    - "shop=clothes"
    - "shop=florist"
    - "shop=jewelry"
    - "shop=bakery"
    - "shop=butcher"
    - "shop=deli"
    - "shop=greengrocer"
    - "shop=gift"
    - "shop=books"
    - "shop=shoes"
    - "shop=optician"
    - "shop=pet"
    - "shop=massage"
    - "shop=dry_cleaning"
    - "shop=tattoo"
    - "shop=travel_agency"
    - "shop=estate_agent"
    - "leisure=fitness_centre"
    - "craft=*"
  # Max usable prospects to keep per area per run.
  max_per_area: 80

# ----------------------------------------------------------------------------
# SOURCE 2: Apollo (optional) — B2B service businesses with real emails
# ----------------------------------------------------------------------------
apollo:
  enabled: false   # set true once APOLLO_API_KEY is configured
  titles: ["Owner", "Founder", "Managing Director", "Practice Manager"]
  industries: ["Law Practice", "Dental", "Accounting", "Marketing & Advertising"]
  locations: ["Australia", "New Zealand", "United Kingdom"]
  per_page: 25

# ----------------------------------------------------------------------------
# SOURCE 3: Manual CSV (optional) — drop leads here from anywhere
# (e.g. exported via the Apollo MCP). Columns: name,email,category,address,
# city,country,phone,website. Processed like any other prospect.
# ----------------------------------------------------------------------------
manual_csv:
  enabled: true
  path: "leads_manual.csv"

# ----------------------------------------------------------------------------
# EMAIL VERIFICATION — gate before any send (protects deliverability)
# ----------------------------------------------------------------------------
verification:
  use_hunter: true         # uses HUNTER_API_KEY if present, else MX+syntax only
  require_mx: true         # drop addresses whose domain has no MX record
  drop_role_free_inbox: false  # keep info@/contact@ (these are the GOOD B2B targets)

# ----------------------------------------------------------------------------
# SENDING
# ----------------------------------------------------------------------------
sending:
  # "review" = write drafts to outbox/ + review_queue.csv (you send manually)
  # "auto"   = actually send via SMTP (needs SMTP_* secrets). Read GO_LIVE.md.
  # The SEND_MODE env var, if set, overrides this.
  mode: "review"
  # Seconds to wait between sends in auto mode (gentle on deliverability).
  delay_seconds: 45
